version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: market
      POSTGRES_PASSWORD: marketpass
      POSTGRES_DB: market
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  server:
    build: ./server
    environment:
      DATABASE_URL: postgresql://market:marketpass@db:5432/market
      JWT_SECRET: change-me-in-prod
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      - db

  web:
    build: ./web
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  db_data:
